name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust workspace (fmt, clippy, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup component add rustfmt clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace --verbose

      - name: Test workspace
        run: cargo test --workspace --verbose

  vscode-extension:
    name: VS Code extension (build + package)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling/vscode-ulx
    steps:
      - uses: actions/checkout@v4

      - name: Validate package.json, language-configuration.json, and the TextMate grammar
        run: |
          set -e
          for f in package.json language-configuration.json syntaxes/ulx.tmLanguage.json; do
            echo "validating $f"
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tooling/vscode-ulx/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile (catches TypeScript errors)
        run: npm run compile

      # Same packaging step release.yml's `vscode-extension` job runs for
      # real -- exercised here on every push/PR so a packaging regression
      # (a missing LICENSE, a broken .vscodeignore, an invalid manifest
      # field) is caught long before a release tag, not during one.
      - name: Package (smoke test only, artifact discarded)
        run: npx vsce package -o /tmp/ulexite-ci-check.vsix

  install-scripts:
    name: Install scripts (shellcheck + PowerShell syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck scripts/install.sh
        run: shellcheck scripts/install.sh

      - name: Parse scripts/install.ps1 (syntax only, doesn't execute it)
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile("scripts/install.ps1", [ref]$tokens, [ref]$errors)
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
          Write-Host "scripts/install.ps1 parses cleanly"

  spec-examples:
    name: Spec examples parse, type-check, and lower
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build ulx CLI
        run: cargo build -p ulx-cli

      # Mirrors `just check-examples` (justfile) as raw commands, same as
      # the `rust` job above mirrors `just ci` -- so CI doesn't depend on
      # `just` being installed on the runner. Keep the two in sync by hand
      # if this loop ever changes.
      - name: Check every example under examples/
        run: |
          set -e
          for f in examples/*.ulx; do
            echo "checking $f"
            ./target/debug/ulx check "$f"
          done
