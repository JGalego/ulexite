name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    name: Verify tag matches Cargo.toml version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Compare tag to workspace.package.version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::tag v$tag_version does not match Cargo.toml's workspace.package.version ($cargo_version) -- bump Cargo.toml before tagging"
            exit 1
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: check-version
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            linker_pkg: gcc-aarch64-linux-gnu
            linker_env: aarch64-linux-gnu-gcc
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            # macos-latest's default Xcode ships Apple's newer linker
            # (ld-prime), which has a known assertion-failure bug on long
            # Rust-mangled symbol names ("makeSymbolStringInPlace ...
            # name.size() <= maxLength") -- macos-13's older Xcode default
            # (used by x86_64-apple-darwin above) isn't affected. Forcing
            # the classic linker is the documented workaround.
            rustflags: "-C link-arg=-ld_classic"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-linker
        if: matrix.linker_pkg != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker_pkg }}

      - name: Configure cross-linker
        if: matrix.linker_env != ''
        shell: bash
        run: |
          upper=$(echo "${{ matrix.target }}" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
          echo "CARGO_TARGET_${upper}_LINKER=${{ matrix.linker_env }}" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build ulx
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --locked -p ulx-cli --target ${{ matrix.target }}

      # Asset names deliberately don't embed the version: this is what lets
      # the README's install command use GitHub's stable
      # `/releases/latest/download/<name>` URL instead of having to look up
      # the newest tag first.
      - name: Package (Linux/macOS)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          staging="ulx-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/ulx" "$staging/"
          cp README.md LICENSE "$staging/"
          tar czf "${staging}.tar.gz" "$staging"

      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $staging = "ulx-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/ulx.exe" "$staging/"
          Copy-Item README.md "$staging/"
          Copy-Item LICENSE "$staging/"
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ulx-${{ matrix.target }}
          path: ulx-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
