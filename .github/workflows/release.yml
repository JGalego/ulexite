name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    name: Verify tag matches Cargo.toml version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Compare tag to workspace.package.version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::tag v$tag_version does not match Cargo.toml's workspace.package.version ($cargo_version) -- bump Cargo.toml before tagging"
            exit 1
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: check-version
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            linker_pkg: gcc-aarch64-linux-gnu
            linker_env: aarch64-linux-gnu-gcc
          # Both Darwin targets build on macos-latest (Apple Silicon),
          # cross-compiling x86_64-apple-darwin from there via `--target`
          # rather than using a separate Intel runner (macos-13) --
          # verified stuck for 10+ hours with zero runner ever picking up
          # its job (every other matrix entry, including the other Darwin
          # target on macos-latest, completed in ~2 minutes), consistent
          # with macos-13 having been deprecated/pulled from the pool.
          # Apple Silicon hosts have always been able to cross-link
          # x86_64-apple-darwin (the same toolchain path universal2
          # binaries use), so this needs no other change.
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            rustflags: "-C link-arg=-ld_classic"
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            # macos-latest's default Xcode ships Apple's newer linker
            # (ld-prime), which has a known assertion-failure bug on long
            # Rust-mangled symbol names ("makeSymbolStringInPlace ...
            # name.size() <= maxLength"). Forcing the classic linker is the
            # documented workaround -- needed for both Darwin targets now
            # that both build here (macos-13's older Xcode default wasn't
            # affected, but macos-13 is no longer in use, see above).
            rustflags: "-C link-arg=-ld_classic"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-linker
        if: matrix.linker_pkg != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker_pkg }}

      - name: Configure cross-linker
        if: matrix.linker_env != ''
        shell: bash
        run: |
          upper=$(echo "${{ matrix.target }}" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
          echo "CARGO_TARGET_${upper}_LINKER=${{ matrix.linker_env }}" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Both binaries ship in the same archive: `ulx-lsp` is what the
      # VS Code extension (and any other LSP-capable editor) execs by name
      # off PATH (`ulexite.serverPath`'s default) -- bundling it with `ulx`
      # means the one install command gets you both the CLI and everything
      # the editor extension needs, no separate LSP install step.
      - name: Build ulx and ulx-lsp
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --locked -p ulx-cli -p ulx-lsp --target ${{ matrix.target }}

      # Asset names deliberately don't embed the version: this is what lets
      # the README's install command use GitHub's stable
      # `/releases/latest/download/<name>` URL instead of having to look up
      # the newest tag first.
      - name: Package (Linux/macOS)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          staging="ulx-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/ulx" "$staging/"
          cp "target/${{ matrix.target }}/release/ulx-lsp" "$staging/"
          cp README.md LICENSE "$staging/"
          tar czf "${staging}.tar.gz" "$staging"

      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $staging = "ulx-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/ulx.exe" "$staging/"
          Copy-Item "target/${{ matrix.target }}/release/ulx-lsp.exe" "$staging/"
          Copy-Item README.md "$staging/"
          Copy-Item LICENSE "$staging/"
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ulx-${{ matrix.target }}
          path: ulx-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  vscode-extension:
    name: Package VS Code extension
    needs: check-version
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling/vscode-ulx
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tooling/vscode-ulx/package-lock.json

      - name: Install dependencies
        run: npm ci

      # A single universal .vsix: the extension has no native code of its
      # own (it execs `ulx-lsp` off PATH, per `ulexite.serverPath`'s
      # default -- see the `build` job above for where that binary comes
      # from), so there's nothing platform-specific to package per target.
      - name: Package extension
        run: npx vsce package -o ulexite.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ulexite-vscode-extension
          path: tooling/vscode-ulx/ulexite.vsix
          if-no-files-found: error

      # Both publish steps check for their token *inside* the shell step
      # rather than gating the step itself on `secrets.X != ''` in `if:`
      # -- simpler to reason about, and means a fork/clone of this repo
      # without these secrets configured still gets a green release (just
      # skips Marketplace/Open VSX publishing, keeping the .vsix release
      # asset above as the fallback install path). Add `VSCE_PAT`
      # (https://marketplace.visualstudio.com/manage, a publisher PAT with
      # Marketplace "Manage" scope) and/or `OVSX_PAT`
      # (https://open-vsx.org, an access token for a namespace you own) as
      # repo secrets to turn these on.
      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT:-}" ]; then
            echo "VSCE_PAT not set -- skipping Marketplace publish (the .vsix release asset still works via 'code --install-extension')"
            exit 0
          fi
          npx vsce publish --packagePath ulexite.vsix

      - name: Publish to Open VSX
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "${OVSX_PAT:-}" ]; then
            echo "OVSX_PAT not set -- skipping Open VSX publish (the .vsix release asset still works via 'code --install-extension')"
            exit 0
          fi
          # First publish needs the "ulexite" namespace to exist under the
          # account OVSX_PAT belongs to -- create it if missing (harmless,
          # already-exists no-op on every release after the first).
          npx ovsx create-namespace ulexite -p "$OVSX_PAT" || true
          npx ovsx publish ulexite.vsix -p "$OVSX_PAT"

  release:
    name: Publish GitHub Release
    needs: [build, vscode-extension]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
