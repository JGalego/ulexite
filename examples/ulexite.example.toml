# Copy this to `examples/ulexite.toml` (same directory as the .ulx files
# below) to run them against real vendors instead of the built-in mock —
# see README.md's "Configuring providers". Each [providers.<name>] table
# is one vendor account/deployment; `vendor` is mandatory and never
# inferred from the table name, so two entries for the same vendor (e.g.
# two different openai_compatible servers) are unambiguous. Every other
# key in a table is a capability name (chat/vision/embed/transcribe/
# speak/generate_image/...) mapped to either a bare model-name string or a
# `{ model = "...", params = { ... } }` table for per-capability overrides.
#
# api_key_env only ever names an environment variable — never put a
# literal API key in this file. Set it before running:
#   export OPENAI_API_KEY=sk-...

[package]
name = "ulexite-examples"
version = "0.1.0"
ulexite = "^0.1"

[providers.openai]
vendor = "openai"
api_key_env = "OPENAI_API_KEY"
chat = "gpt-4o-mini"
vision = "gpt-4o-mini"
embed = "text-embedding-3-small"
transcribe = "whisper-1"
speak = "tts-1"
generate_image = "dall-e-3"

# Per-capability overrides look like this instead of a bare string:
# [providers.openai.chat]
# model = "gpt-4o-mini"
# [providers.openai.chat.params]
# temperature = 0.2
