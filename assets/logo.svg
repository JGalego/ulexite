<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Ulexite logo: a cluster of crystal shards dispersing light like a prism">
  <title>Ulexite</title>
  <defs>
    <linearGradient id="shard1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="shard2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shard3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="45%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="shard4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="shard5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- shard 1 -->
  <polygon points="42,97 58,83 74,97 74,169 58,183 42,169" fill="url(#shard1)" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
  <line x1="58" y1="89" x2="58" y2="177" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>

  <!-- shard 2 -->
  <polygon points="72,71 90,55 108,71 108,179 90,195 72,179" fill="url(#shard2)" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
  <line x1="90" y1="61" x2="90" y2="189" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>

  <!-- shard 3 (center, tallest) -->
  <polygon points="102,49 122,31 142,49 142,191 122,209 102,191" fill="url(#shard3)" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="122" y1="39" x2="122" y2="201" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.2"/>

  <!-- shard 4 -->
  <polygon points="136,75 154,59 172,75 172,175 154,191 136,175" fill="url(#shard4)" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
  <line x1="154" y1="65" x2="154" y2="185" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>

  <!-- shard 5 -->
  <polygon points="169,102 184,89 199,102 199,162 184,175 169,162" fill="url(#shard5)" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
  <line x1="184" y1="95" x2="184" y2="169" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>
</svg>
